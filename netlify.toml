[build]
  command = "npm install --prefix frontend && npm --prefix frontend run build"
  publish = "frontend/dist"
  functions = "backend/netlify-functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
